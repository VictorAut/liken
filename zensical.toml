[project]
site_name = "Liken"
site_url = "https://victoraut.github.io/liken/"
repo_name = "VictorAut/liken"
repo_url = "https://github.com/VictorAut/liken"
site_description = "Liken is a library providing enhanced deduplication tooling for DataFrames"
site_author = "Victor Autonell-Oiry"
copyright = "Victor Autonell-Oiry &copy; 2025 - 2026"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]
nav = [
    { "Liken" = "index.md" },
    { "Tutorials" = [
        "tutorials/first-steps.md",
        "tutorials/applying-dedupers.md",
        "tutorials/record-linkage.md",
        "tutorials/custom-dedupers.md",
    ] },
    { "In Practice" = [
        "in-practice/common-recipes.md",
        "in-practice/iterative-workloads.md",
        "in-practice/performance.md",
    ] },
    { "API Reference" = [
        "reference/liken.md",
        "reference/preprocessors.md",
        "reference/custom.md",
        "reference/datasets.md",
    ] },
    { "About" = [
        "about/release-history.md",
        "about/contributing.md",
        "about/license.md",
        { "PyPI ↗" = "https://pypi.org/project/liken/" },
        { "Github ↗" = "https://github.com/VictorAut/liken" }
    ] },
]

# THEME:

[project.theme]
custom_dir = "./overrides"
logo = "images/favicon-transparent.png"
favicon = "images/favicon-transparent.png"
features = [
    "navigation.top",
    "navigation.tabs",
    "navigation.sections",
    "navigation.tracking",
    "navigation.footer",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "announce.dismiss",
]

[[project.theme.palette]]
primary = "custom"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
primary = "custom"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# DOCSTRINGS:

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_symbol_type_heading = true
show_symbol_type_toc = true
show_object_full_path = true
show_docstring_type_aliases = true
show_root_toc_entry = true
show_root_full_path = true
filters = ["!^_"]

# MARKDOWN EXTENSIONS:

[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
line_spans = "__span"
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# VERSIONING:

[project.extra.version]
provider = "mike"

# TERMYNAL:

[project.markdown_extensions.termynal]
include_assets = true
title = "bash"
buttons = "macos"
prompt_literal_start = ["$"]
