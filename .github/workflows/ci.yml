name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  linting:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v6

        - name: python | setup
          uses: actions/setup-python@v6
          with:
            python-version-file: "pyproject.toml"

        - name: uv | install
          uses: astral-sh/setup-uv@v7
          with:
            version: "0.10.4"

        - name: liken | project install
          run: |
            uv sync --locked --all-extras --group lint

        - name: Install Task
          uses: arduino/setup-task@v2
          with:
            version: 3.48.0

        - name: lint
          run: |
            task lint

  test-coverage:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: python | setup  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: uv | install
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"

      - name: liken | project install
        run: |
          uv sync --locked --all-extras --group test

      - name: tests | run
        run: |
          uv run coverage run -m pytest tests/ -v
          uv run coverage xml --omit "tests/**/*"

      - name: coverage | upload to codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
      
      - name: tests | coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "coverage.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both

      - name: coverage | add header
        run: |
          echo "## Coverage Report" > coverage.md
          cat code-coverage-results.md >> coverage.md
  
      - name: tests | pr-comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request'}}
        with:
          header: Coverage Report
          hide_and_recreate: true
          path: coverage.md
  
  test-extras:
    runs-on: ubuntu-latest
    needs: test-coverage

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        extras: ["minimal", "all", "dask", "ray", "pyspark"]

    steps:
      - uses: actions/checkout@v6

      - name: python | setup  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: uv | install
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"

      - name: tox | install
        run: |
          uv tool install tox --with tox-uv

      - name: test | optional imports
        run: |
          tox run -e ${{ matrix.python-extras }}-${{ matrix.python-version }}